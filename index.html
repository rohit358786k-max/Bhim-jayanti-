<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भीम जयंती २०२६ - अंतरवाली टेंभी</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #f0f2f5; padding: 10px; margin: 0; text-align: center; }
        .form-container { background: white; padding: 12px; border-radius: 10px; width: 100%; max-width: 380px; margin: 0 auto 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; }

        /* पावती डिझाइन */
        .receipt-card {
            background: #fff; width: 360px; margin: 0 auto; border: 4px double #00008B; border-radius: 10px; padding: 15px;
            text-align: left; position: relative;
            background-image: linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)), url('background.jpg');
            background-size: cover; background-position: center;
        }

        .photo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .photo-box { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #00008B; overflow: hidden; background: #eee; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .header { text-align: center; color: #00008B; border-bottom: 2px solid #00008B; margin-bottom: 10px; }
        .header h1 { margin: 2px 0; font-size: 20px; }
        .village-name { font-size: 18px; color: #cc0000; font-weight: bold; }

        .content { font-size: 16px; line-height: 1.8; color: #222; }
        .dynamic-value { color: #d32f2f; font-weight: bold; border-bottom: 1px dotted #999; }
        .footer { margin-top: 15px; text-align: right; font-weight: bold; border-top: 1px solid #ddd; padding-top: 5px; }

        .btn-save { background: #28a745; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; max-width: 380px; margin-top: 10px; }
        #loading { display: none; color: #00008B; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <input type="text" id="inputName" placeholder="दात्याचे नाव" oninput="updateReceipt()">
    <input type="number" id="inputAmount" placeholder="रक्कम (₹)" oninput="updateReceipt()">
    <input type="text" id="inputMobile" placeholder="मोबाईल नंबर" oninput="updateReceipt()">
</div>

<div id="printableReceipt" class="receipt-card">
    <div class="photo-header">
        <div class="photo-box"><img src="ambedkar.jpg" alt="Ambedkar"></div>
        <div style="font-weight: bold; color: #00008B; font-size: 14px;">॥ जय भीम ॥</div>
        <div class="photo-box"><img src="buddha.jpg" alt="Buddha"></div>
    </div>
    <div class="header">
        <h1>भीम जयंती उत्सव २०२६</h1>
        <div class="village-name">अंतरवाली टेंभी</div>
    </div>
    <div class="content">
        सप्रेम जय भीम, <br>
        श्री/सौ: <span id="dispName" class="dynamic-value">__________</span> <br>
        यांचेकडून <b>भीम जयंती उत्सव २०२६</b> करिता <br>
        रक्कम: <span class="dynamic-value">₹ <span id="dispAmount">00</span>/-</span> <br>
        मोबाईल: <span id="dispMobile" class="dynamic-value">__________</span> <br>
        वर्गणी मिळाली. धन्यवाद!
    </div>
    <div class="footer">विनित: भीम जयंती उत्सव समिती</div>
</div>

<button class="btn-save" id="btnDownload" onclick="handleSave()">📥 PDF पावती डाऊनलोड करा</button>
<div id="loading">प्रत तयार होत आहे, कृपया थांबा...</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz9kBJJJnP23AbBJsmCpz8Cn1dFHnVSCDN5DiEAr33pwafkXEAGKJTyZXE-q9dBFcCEUw/exec';

    function updateReceipt() {
        document.getElementById('dispName').innerText = document.getElementById('inputName').value || "__________";
        document.getElementById('dispAmount').innerText = document.getElementById('inputAmount').value || "00";
        document.getElementById('dispMobile').innerText = document.getElementById('inputMobile').value || "__________";
    }

    async function handleSave() {
        const name = document.getElementById('inputName').value;
        const amount = document.getElementById('inputAmount').value;
        const mobile = document.getElementById('inputMobile').value;

        if (!name || !amount) return alert("माहिती भरा!");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('btnDownload').disabled = true;

        // १. डेटा गुगल शीटला पाठवणे
        try {
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, amount, mobile }) });
        } catch (e) { console.log("Sheet Error"); }

        // २. PDF तयार करणे (Wait for images to render)
        setTimeout(async () => {
            try {
                const { jsPDF } = window.jspdf;
                const receipt = document.getElementById('printableReceipt');
                const canvas = await html2canvas(receipt, { scale: 2, useCORS: true, allowTaint: true });
                const imgData = canvas.toDataURL('image/png');

                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const imgWidth = 150; 
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                pdf.addImage(imgData, 'PNG', (pdfWidth - imgWidth) / 2, 20, imgWidth, imgHeight);
                pdf.save(`Pavati_${name}.pdf`);
                
                alert("डाऊनलोड यशस्वी!");
            } catch (error) {
                alert("डाऊनलोड करताना त्रुटी आली. कृपया पुन्हा प्रयत्न करा.");
                console.error(error);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('btnDownload').disabled = false;
            }
        }, 1000); // १ सेकंद थांबून डाऊनलोड होईल
    }
</script>

</body>
</html>
